[build]
  command = "echo Static PWA deploy"
  publish = "web"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.20.2"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
